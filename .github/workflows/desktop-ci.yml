name: Desktop CI

on:
  push:
    branches: [main]
    paths:
      - "chaoxing-desktop/**"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "chaoxing-desktop/**"
      - ".github/workflows/desktop-ci.yml"
  workflow_dispatch:

jobs:
  check:
    name: Check (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: chaoxing-desktop/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: chaoxing-desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Install frontend dependencies
        working-directory: chaoxing-desktop
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: chaoxing-desktop
        run: pnpm tsc --noEmit

      - name: Rust cargo check
        working-directory: chaoxing-desktop/src-tauri
        run: cargo check --all-targets

      - name: Rust unit tests
        working-directory: chaoxing-desktop/src-tauri
        run: cargo test --lib
