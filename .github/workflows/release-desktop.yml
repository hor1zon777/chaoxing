name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        default: "v0.0.0-dev"

jobs:
  build-tauri:
    name: Build (${{ matrix.platform }} / ${{ matrix.rust_target }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_target: aarch64-apple-darwin
            artifact_name: macos-aarch64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - platform: windows-latest
            args: "--bundles nsis"
            rust_target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: chaoxing-desktop/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libfuse2 \
            libxdo-dev

      - name: Install frontend dependencies
        working-directory: chaoxing-desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: chaoxing-desktop
          args: ${{ matrix.args }}

      - name: Collect bundle artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # 用 find 兼容跨平台地收集所有可能的产物
          BUNDLE_DIR="chaoxing-desktop/src-tauri/target"
          # 子目录可能是 release（无 --target）或 <triple>/release（有 --target）
          find "$BUNDLE_DIR" -type d -name bundle | while read -r dir; do
            echo "Searching: $dir"
            find "$dir" \
              \( -name "*.dmg" \
              -o -name "*.app.tar.gz" \
              -o -name "*.app.tar.gz.sig" \
              -o -name "*.AppImage" \
              -o -name "*.AppImage.sig" \
              -o -name "*.deb" \
              -o -name "*.rpm" \
              -o -name "*.msi" \
              -o -name "*.msi.zip" \
              -o -name "*.msi.zip.sig" \
              -o -name "*-setup.exe" \
              -o -name "*-setup.nsis.zip" \
              -o -name "*-setup.nsis.zip.sig" \
              \) \
              -exec cp -v {} artifacts/ \;
          done
          echo "--- Collected artifacts ---"
          ls -la artifacts/

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: bundle-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -la bundles/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "超星学习通助手 ${{ steps.tag.outputs.value }}"
          body: |
            自动构建的桌面版发布。

            ### 安装包说明
            - **Windows**: `*-setup.exe` (NSIS 安装包)
            - **macOS (Apple Silicon)**: `*_aarch64.dmg`
            - **macOS (Intel)**: `*_x64.dmg`
            - **Linux**: `*.AppImage` / `*.deb`

            > 完整功能与配置说明见 [README](https://github.com/${{ github.repository }}#readme)
          files: bundles/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
